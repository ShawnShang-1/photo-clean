# project.yml - XcodeGen 配置参考
# 注意：本机未安装 XcodeGen，此文件仅作参考
# 如需使用 XcodeGen，请先安装：brew install xcodegen

name: QuLiu
options:
  bundleIdPrefix: com.quliu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

targets:
  QuLiu:
    type: application
    platform: iOS
    sources:
      - path: ../App
      - path: ../Models
      - path: ../Views
      - path: ../ViewModels
      - path: ../Services
      - path: ../Extensions
      - path: ../Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quliu.app
        INFOPLIST_FILE: ../App/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SUPPORTED_INTERFACE_ORIENTATIONS: UIInterfaceOrientationPortrait
